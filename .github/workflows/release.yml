name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build static linux/amd64 binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: musl-release

      - name: Build
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/proxmox-imgctl \
             dist/proxmox-imgctl-x86_64-linux
          chmod +x dist/proxmox-imgctl-x86_64-linux
          (cd dist && sha256sum proxmox-imgctl-x86_64-linux > proxmox-imgctl-x86_64-linux.sha256)
          ls -lh dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/proxmox-imgctl-x86_64-linux
            dist/proxmox-imgctl-x86_64-linux.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
